name: Keep Render App Awake

on:
  schedule:
    - cron: "*/5 * * * *"  # every 5 minutes
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render app
        run: |
          curl -s -o /dev/null -w "%{http_code}" https://lottery-insights.onrender.com/?health=true || true
